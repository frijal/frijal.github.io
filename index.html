<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="canonical" href="https://frijal.pages.dev/">
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://frijal.pages.dev/">
  </noscript>
  <script>
    (() => {
      const base = "https://frijal.pages.dev";
      const u = base + location.pathname + location.search + location.hash;
      document.querySelector('link[rel=canonical]').href = u;
      location.replace(u);
    })();
  </script>
</head>
<body>
</body>
</html>
